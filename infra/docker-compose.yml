name: mediacreator

services:
  postgres:
    image: postgres:16
    container_name: mediacreator-postgres
    environment:
      POSTGRES_DB: ${MEDIACREATOR_DB_NAME:-mediacreator}
      POSTGRES_USER: ${MEDIACREATOR_DB_USER:-mediacreator}
      POSTGRES_PASSWORD: ${MEDIACREATOR_DB_PASSWORD:-mediacreator}
    ports:
      - "${MEDIACREATOR_DB_PORT:-54329}:5432"
    volumes:
      - mediacreator-postgres:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${MEDIACREATOR_DB_USER:-mediacreator} -d ${MEDIACREATOR_DB_NAME:-mediacreator}"
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

volumes:
  mediacreator-postgres:
